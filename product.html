<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Mathura Dress Bhandaar</div>
  <div class="cart" onclick="goToCart()">🛒 Cart</div>
</div>

<!-- PRODUCT SECTION -->
<div class="product-page" id="product"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwwzRrKZMCmAm2cTWvHExJo9hm4b3kKo7RToM4uiCBCdTGfwLJtBs-F8V9Rh4NK9wOW/exec"; // your API

  async function getProducts() {
  let cached = localStorage.getItem("products");

  if (cached) {
    return JSON.parse(cached);
  }

  const res = await fetch(API_URL); // ✅ correct
  const data = await res.json();

  localStorage.setItem("products", JSON.stringify(data));

  return data;
}

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    const p = data.find(item => item.id == id);

    let images = [];
    if (p.images) {
      images = p.images.split(",");
    } else {
      images = [p.image];
    }

    document.getElementById("product").innerHTML = `
      <div>
        <img src="${images[0]}" class="product-img" id="mainImg">
        
        <div style="display:flex; gap:10px; margin-top:10px;">
          ${images.map(img => `
            <img src="${img}" 
              style="width:60px; height:60px; cursor:pointer; border-radius:6px;"
              onclick="changeImage('${img}')">
          `).join("")}
        </div>
      </div>

      <div class="product-info">
        <div class="product-title">${p.name}</div>
        <div class="product-price">₹${p.price}</div>

        <p>Size: ${p.size || "Standard"}</p>
        <p>Stock: ${p.stock}</p>

        ${
          p.stock > 0
          ? `<button onclick="addToCart(${p.id})">Add to Cart</button>`
          : `<button disabled>Out of Stock</button>`
        }
      </div>
    `;
  });

function changeImage(src) {
  document.getElementById("mainImg").src = src;
}

function addToCart(id) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let item = cart.find(i => i.id == id);

  if (item) {
    item.qty += 1;
  } else {
    cart.push({ id: id, qty: 1 });
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  document.querySelector(".cart").innerText = "🛒 Added!";
setTimeout(() => {
  document.querySelector(".cart").innerText = "🛒 Cart";
}, 1500);
}

function goToCart() {
  window.location.href = "cart.html";
}
</script>

</body>
</html>
