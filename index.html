<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathura Dress Bhandaar</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}
header {
    background: linear-gradient(90deg,#ff7a18,#ffb347);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}
.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}
.products {
    flex: 3;
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
    gap: 20px;
}
.card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}
.card-body {
    padding: 15px;
}
.price {
    font-weight: bold;
    margin: 10px 0;
}
button {
    width: 100%;
    padding: 10px;
    background: #ff7a18;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
.cart {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 12px;
    height: fit-content;
    position: sticky;
    top: 20px;
}
input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}
</style>
</head>
<body>

<header>Mathura Dress Bhandaar</header>

<div class="container">
    <div class="products" id="products"></div>

    <div class="cart">
        <h3>Cart</h3>
        <p>Total: ₹<span id="total">0</span></p>
        <input placeholder="Full Name">
        <input placeholder="Phone">
        <input placeholder="Address">
        <button>Place Order</button>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwwzRrKZMCmAm2cTWvHExJo9hm4b3kKo7RToM4uiCBCdTGfwLJtBs-F8V9Rh4NK9wOW/exec";

let cartTotal = 0;

fetch(API_URL)
.then(res => res.json())
.then(data => {
    const container = document.getElementById("products");

    data.forEach(p => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${p.image}">
            <div class="card-body">
                <h3>${p.name}</h3>
                <div class="price">₹${p.price}</div>
                <input type="number" value="1" min="1" id="qty-${p.id}">
                <button onclick="addToCart(${p.price}, ${p.id})">Add to Cart</button>
            </div>
        `;
        container.appendChild(div);
    });
});

function addToCart(price, id){
    let qty = document.getElementById("qty-"+id).value;
    cartTotal += price * qty;
    document.getElementById("total").innerText = cartTotal;
}
</script>

</body>
</html>
