<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body>
<header>Mathura Dress Bhandaar</header>
<div id="products"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbwwzRrKZMCmAm2cTWvHExJo9hm4b3kKo7RToM4uiCBCdTGfwLJtBs-F8V9Rh4NK9wOW/exec';
fetch(API).then(r=>r.json()).then(data=>{
let html="";
data.forEach(function(p){
if(p.stock==0) return;
html+='<div class="card" onclick="openProduct('+p.id+')">'+
'<img src="'+p.image+'">'+
'<h3>'+p.name+'</h3>'+
'₹'+p.price+
'</div>';
});
document.getElementById("products").innerHTML=html;
});
function openProduct(id){window.location="product.html?id="+id;}
</script>
</body>
</html>
