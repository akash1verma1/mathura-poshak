<!DOCTYPE html>
<html>
<head>
  <title>Mathura Dress Bhandaar</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Mathura Dress Bhandaar</div>
  <div class="cart" onclick="goToCart()">
  🛒 Cart <span id="cartCount" class="cart-badge">0</span>
</div>
</div>

<!-- PRODUCT GRID -->
<div id="loader" class="loader">Loading products...</div>
<div class="container" id="products" style="display:none;"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwwzRrKZMCmAm2cTWvHExJo9hm4b3kKo7RToM4uiCBCdTGfwLJtBs-F8V9Rh4NK9wOW/exec";

  async function getProducts() {
  let cached = localStorage.getItem("products");

  if (cached) {
    return JSON.parse(cached);
  }

  const res = await fetch(API_URL);
if (!res.ok) throw new Error("API failed"); // ✅ correct
  const data = await res.json();

  localStorage.setItem("products", JSON.stringify(data));

  return data;
}

// Load products
async function loadProducts() {
  try {
    const data = await getProducts();

    const container = document.getElementById("products");

    // safety check
    if (!data || data.length === 0) {
      document.getElementById("loader").innerText = "No products found";
      return;
    }

    document.getElementById("loader").style.display = "none";
    container.style.display = "grid";

    container.innerHTML = "";

    data.forEach(p => {
      const stockText = p.stock > 0 ? "In Stock" : "Out of Stock";

      container.innerHTML += `
        <div class="card">
          <img src="${p.image}" onclick="goToProduct(${p.id})">
          <div class="title">${p.name}</div>
          <div class="price">₹${p.price}</div>
          <div style="color:${p.stock > 0 ? 'green' : 'red'}">
            ${stockText}
          </div>
          <button onclick="addToCart(${p.id})"
            ${p.stock == 0 ? 'disabled' : ''}>
            Add to Cart
          </button>
        </div>
      `;
    });

    updateCartCount();

  } catch (error) {
    console.error(error);
    document.getElementById("loader").innerText = "Failed to load products";
  }
}

// Navigate to product page
function goToProduct(id) {
  window.location.href = "product.html?id=" + id;
}

// Go to cart
function goToCart() {
  window.location.href = "cart.html";
}

// Add to cart
function addToCart(id) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let existing = cart.find(item => item.id == id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ id: id, qty: 1 });
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  console.log("Added:", id, cart);
  updateCartCount();
}

loadProducts();

  function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  
  let total = 0;
  cart.forEach(item => total += item.qty);

  document.getElementById("cartCount").innerText = total;
}
</script>

</body>
</html>
