<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <div class="logo">Mathura Dress Bhandaar</div>
  <div class="cart" onclick="goHome()">🏠 Home</div>
</div>

<div class="cart-wrapper">

  <!-- LEFT: ITEMS -->
  <div id="cartItems" class="cart-left"></div>

  <!-- RIGHT: PRICE -->
  <div class="cart-right">
    <h3>Price Details</h3>
    <p>Total Items: <span id="itemCount">0</span></p>
    <p>Total Price: ₹<span id="total">0</span></p>

    <button class="place-order" onclick="placeOrder()">Place Order</button>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwwzRrKZMCmAm2cTWvHExJo9hm4b3kKo7RToM4uiCBCdTGfwLJtBs-F8V9Rh4NK9wOW/exec";

  async function placeOrder() {

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  const products = await getProducts();

  let total = 0;
  let productList = [];

  cart.forEach(c => {
    const p = products.find(x => x.id == c.id);
    if (!p) return;

    total += p.price * c.qty;

    productList.push(`${p.name} x ${c.qty}`);
  });

  const orderData = {
    name: "Test User",
    phone: "9999999999",
    email: "test@mail.com",
    address: "Test Address",
    products: productList.join(", "),
    total: total,
    remarks: ""
  };
    console.log(orderData);   // ✅ ADD THIS LINE

  // 🔥 SEND TO GOOGLE SHEET
  const res = await fetch(API_URL, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(orderData)
});

const result = await res.json();
console.log(result);

  alert("Order Placed!");

  localStorage.removeItem("cart");
  window.location.href = "index.html";
}

  async function getProducts() {
  let cached = localStorage.getItem("products");

  if (cached) {
    return JSON.parse(cached);
  }

  const res = await fetch(API_URL); // ✅ correct
  const data = await res.json();

  localStorage.setItem("products", JSON.stringify(data));

  return data;
}

function goHome() {
  window.location.href = "index.html";
}

async function loadCart() {
 const products = await getProducts();

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const container = document.getElementById("cartItems");

// show loading
container.innerHTML = "Loading cart...";
  let total = 0;
  let itemCount = 0;
let html = "";
 cart.forEach(c => {
  const p = products.find(x => x.id == c.id);
  if (!p) return;

  total += p.price * c.qty;
   itemCount += c.qty;

  html += `
  <div class="cart-item">
    <img src="${p.image}">

    <div>
      <div class="title">${p.name}</div>
      <div>₹${p.price}</div>

      <div class="qty-controls">
        <button onclick="changeQty(${c.id}, -1)">-</button>
        ${c.qty}
        <button onclick="changeQty(${c.id}, 1)">+</button>
      </div>

      <button onclick="removeItem(${c.id})">Remove</button>
    </div>
  </div>
`;
});
  container.innerHTML = html;
  document.getElementById("itemCount").innerText = itemCount;
  document.getElementById("total").innerText = total;
  
}

function changeQty(id, change) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let item = cart.find(i => i.id == id);

  if (item) {
    item.qty += change;
    if (item.qty <= 0) {
      cart = cart.filter(i => i.id != id);
    }
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

function removeItem(id) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart = cart.filter(i => i.id != id);

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

loadCart();
</script>

</body>
</html>
