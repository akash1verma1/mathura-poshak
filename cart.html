<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <div class="logo">Mathura Dress Bhandaar</div>
  <div class="cart" onclick="goHome()">🏠 Home</div>
</div>

<div class="cart-wrapper">

  <!-- LEFT: ITEMS -->
  <div id="cartItems" class="cart-left"></div>

  <!-- RIGHT: PRICE -->
  <div class="cart-right">
    <h3>Price Details</h3>
    <p>Total Items: <span id="itemCount">0</span></p>
    <p>Total Price: ₹<span id="total">0</span></p>

    <button class="place-order" onclick="openModal()">Place Order</button>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwwzRrKZMCmAm2cTWvHExJo9hm4b3kKo7RToM4uiCBCdTGfwLJtBs-F8V9Rh4NK9wOW/exec";

  function openModal() {
  document.getElementById("orderModal").style.display = "block";
}

function closeModal() {
  document.getElementById("orderModal").style.display = "none";
}
  
 async function submitOrder() {

  let name = document.getElementById("custName").value;
  let phone = document.getElementById("custPhone").value;
  let email = document.getElementById("custEmail").value;
  let address = document.getElementById("custAddress").value;

  if (!name || !phone || !address) {
  alert("Please fill required fields");
  return;
}

if (phone.length !== 10 || isNaN(phone)) {
  alert("Enter valid 10-digit phone number");
  return;
}

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const products = await getProducts();

  let total = 0;
  let productList = [];

  cart.forEach(c => {
    const p = products.find(x => x.id == c.id);
    if (!p) return;

    total += p.price * c.qty;
    productList.push(`${p.name} x ${c.qty}`);
  });

  const orderData = {
    name,
    phone,
    email,
    address,
    products: productList.join(", "),
    total,
    remarks: ""
  };

  const url = API_URL + "?action=order&data=" + encodeURIComponent(JSON.stringify(orderData));

  await fetch(url);

  alert("Order Placed!");
   closeModal();

  localStorage.removeItem("cart");
  window.location.href = "index.html";
}

  async function getProducts() {
  let cached = localStorage.getItem("products");

  if (cached) {
    return JSON.parse(cached);
  }

  const res = await fetch(API_URL); // ✅ correct
  const data = await res.json();

  localStorage.setItem("products", JSON.stringify(data));

  return data;
}

function goHome() {
  window.location.href = "index.html";
}

async function loadCart() {
 const products = await getProducts();

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const container = document.getElementById("cartItems");

// show loading
container.innerHTML = "Loading cart...";
  let total = 0;
  let itemCount = 0;
let html = "";
 cart.forEach(c => {
  const p = products.find(x => x.id == c.id);
  if (!p) return;

  total += p.price * c.qty;
   itemCount += c.qty;

  html += `
  <div class="cart-item">
    <img src="${p.image}">

    <div>
      <div class="title">${p.name}</div>
      <div>₹${p.price}</div>

      <div class="qty-controls">
        <button onclick="changeQty(${c.id}, -1)">-</button>
        ${c.qty}
        <button onclick="changeQty(${c.id}, 1)">+</button>
      </div>

      <button onclick="removeItem(${c.id})">Remove</button>
    </div>
  </div>
`;
});
  container.innerHTML = html;
  document.getElementById("itemCount").innerText = itemCount;
  document.getElementById("total").innerText = total;
  
}

function changeQty(id, change) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let item = cart.find(i => i.id == id);

  if (item) {
    item.qty += change;
    if (item.qty <= 0) {
      cart = cart.filter(i => i.id != id);
    }
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

function removeItem(id) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart = cart.filter(i => i.id != id);

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

loadCart();
</script>
<div id="orderModal" class="modal">
  <div class="modal-content">
    <h3>Enter Details</h3>

    <input type="text" id="custName" placeholder="Name">
    <input type="text" id="custPhone" placeholder="Phone">
    <input type="email" id="custEmail" placeholder="Email (optional)">
    <textarea id="custAddress" placeholder="Address"></textarea>

    <button onclick="submitOrder()">Submit Order</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>
</body>
</html>
